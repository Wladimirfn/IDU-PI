name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build and diff check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24    # antes: 22 — alinear con el runtime real y @types/node@24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install SQLite CLI
        run: choco install sqlite -y --no-progress

      - name: Build
        run: corepack pnpm build

      - name: Test
        run: corepack pnpm test

      - name: Check diff whitespace
        run: git diff --check
