name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  validate-pr-policy:
    name: Validate PR policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [[ ! "$HEAD_REF" =~ ^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)/[a-z0-9._-]+$ ]]; then
            echo "Branch '$HEAD_REF' must match: type/description"
            exit 1
          fi

      - name: Validate exactly one type label
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          count=$(jq '[.[].name | select(startswith("type:"))] | length' <<< "$LABELS_JSON")
          labels=$(jq -r '[.[].name | select(startswith("type:"))] | join(", ")' <<< "$LABELS_JSON")
          if [[ "$count" != "1" ]]; then
            echo "PR must have exactly one type:* label. Found $count: ${labels:-none}"
            exit 1
          fi

      - name: Validate approved linked issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const match = body.match(/(?:Closes|Fixes|Resolves)\s+#(\d+)/i);
            if (!match) {
              core.setFailed("PR body must contain Closes #N, Fixes #N, or Resolves #N.");
              return;
            }

            const issueNumber = Number(match[1]);
            const { owner, repo } = context.repo;
            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber,
            });

            if (issue.pull_request) {
              core.setFailed(`#${issueNumber} is a pull request, not an issue.`);
              return;
            }

            const labels = issue.labels.map((label) =>
              typeof label === "string" ? label : label.name,
            );
            if (!labels.includes("status:approved")) {
              core.setFailed(`Linked issue #${issueNumber} must have status:approved label.`);
              return;
            }

            core.info(`Linked issue #${issueNumber} is approved.`);
